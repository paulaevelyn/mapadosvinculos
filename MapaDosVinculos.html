    textarea { font-family: inherit; resize: vertical; }
    details summary { list-style: none; cursor: pointer; }
    details summary::-webkit-details-marker { display: none; }

      body * { visibility: hidden !important; }

      .print-area { position: absolute; left: 0; top: 0; width: 100%; }
      .no-print { display: none !important; }
      @page { margin: 14mm; }
    }

function Ic({ name, size=22, color="currentColor" }) {
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
      fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
      dangerouslySetInnerHTML={{ __html: SVGS[name] || "" }} />
  );
}

// ─── MINI UI ──────────────────────────────────────────────────────────────────
function ProgressBar({ value }) {
  return (
    <div className="w-full bg-neutral-200 rounded-full h-2">
      <div className="h-2 rounded-full transition-all" style={{ width: `${value}%`, backgroundColor: B.mintDark }} />
    </div>
  );
}

function Btn({ children, onClick, disabled, outline, ghost, style={}, className="" }) {
  const base = "inline-flex items-center justify-center gap-1 rounded-2xl h-12 px-4 text-sm font-semibold cursor-pointer border-0 transition-opacity disabled:opacity-40 disabled:cursor-not-allowed";
  if (ghost) return <button onClick={onClick} disabled={disabled} style={style} className={`${base} bg-transparent text-neutral-700 hover:bg-neutral-100 ${className}`}>{children}</button>;
  if (outline) return <button onClick={onClick} disabled={disabled} style={style} className={`${base} bg-white border border-neutral-200 text-neutral-700 hover:bg-neutral-50 ${className}`}>{children}</button>;
  return <button onClick={onClick} disabled={disabled} style={{ backgroundColor: B.coralDark, color:"white", ...style }} className={`${base} ${className}`}>{children}</button>;
}

function Badge({ children }) {
  return <span className="inline-block rounded-full text-xs font-semibold px-3 py-1 mb-2" style={{ backgroundColor: B.mintDark, color:"white" }}>{children}</span>;
}

function Card({ children }) {
  return <div className="page-in rounded-[2rem] shadow-lg bg-white"><div className="p-5 sm:p-7">{children}</div></div>;
}

function SectionHeader({ iconName, badge, title, subtitle }) {
  return (
    <div className="flex items-start gap-3 mb-5">
      <div className="rounded-3xl p-3 shrink-0" style={{ backgroundColor: B.mint }}>
        <Ic name={iconName} size={28} color={B.ink} />
      </div>
      <div>
        <Badge>{badge}</Badge>
        <h2 className="text-2xl font-bold leading-tight" style={{ color: B.ink }}>{title}</h2>
        {subtitle && <p className="text-sm text-neutral-600 mt-1 leading-relaxed">{subtitle}</p>}
      </div>
    </div>
  );
}

function Textarea({ value, onChange, placeholder, minH="90px" }) {
  return (
    <textarea value={value} onChange={onChange} placeholder={placeholder}
      className="mt-2 w-full rounded-3xl border border-neutral-200 p-4 outline-none bg-white text-sm"
      style={{ minHeight: minH }} />
  );
}

function Saved() {
  return <p className="text-sm mt-2" style={{ color: B.mintDark }}>Registrado para o relatório final.</p>;
}

function addRecord(setRecords, record) {
  setRecords(prev => [...prev, { ...record, createdAt: new Date().toLocaleString("pt-BR") }]);
}

    addRecord(setRecords, { type:"modo de sobrevivência", module:"Modos de sobrevivência", prompt:selected.name, answer:note||"Sem anotação", feedback:`Vulnerabilidade: ${selected.vulnerability}\nComo pode chegar: ${selected.impact}\nAlternativa: ${selected.alternative}` });
    setSaved(true);
  }

  return (
    <Card>
      <SectionHeader iconName="AlertTriangle" badge="mapear" title="9 · Modos de sobrevivência" subtitle="Quando vulnerabilidade parece perigo, um modo pode assumir o comando." />
      <div className="space-y-3">
        {survivalModes.map(mode => (
          <button key={mode.name} onClick={() => { setSelected(mode); setNote(""); setSaved(false); }}
            className="w-full text-left rounded-3xl border-2 p-4 bg-white transition"
            style={{ borderColor: selected?.name===mode.name ? B.mintDark : "#e5e7eb" }}>
            <h3 className="font-bold text-sm" style={{ color: B.ink }}>{mode.name}</h3>
            <p className="text-xs text-neutral-500 mt-1">{mode.vulnerability}</p>
          </button>
        ))}
      </div>
      {selected && (
        <div className="mt-5 rounded-3xl p-4 space-y-2" style={{ backgroundColor: B.cream }}>
          <h3 className="font-bold text-lg">{selected.name}</h3>
          <p className="text-sm"><b>Vulnerabilidade protegida:</b> {selected.vulnerability}</p>
          <p className="text-sm"><b>Como pode chegar no outro:</b> {selected.impact}</p>
          <p className="text-sm"><b>Alternativa cooperativa:</b> "{selected.alternative}"</p>
          <Textarea value={note} onChange={e => setNote(e.target.value)} placeholder="Com qual parte me identifico?" minH="80px" />
          <Btn onClick={save} className="w-full mt-1">Registrar modo</Btn>
          {saved && <Saved />}
        </div>
      )}
    </Card>
  );
}

function Regulacao({ setRecords }) {
  const [selected, setSelected] = useState(null);
  const [note, setNote] = useState("");
  const [saved, setSaved] = useState(false);

  function save() {
    if (!selected) return;
    addRecord(setRecords, { type:"recurso de regulação", module:"Regulação no momento", prompt:selected.title, answer:note||"Sem anotação", feedback:selected.anchor });
    setSaved(true);
  }

  return (
    <Card>
      <SectionHeader iconName="Wind" badge="regular" title="10 · Regulação no momento" subtitle="Ferramentas para criar espaço entre o impulso e a resposta." />
      <div className="rounded-3xl p-4 mb-4 text-sm leading-relaxed" style={{ backgroundColor: B.rose }}>
        <b style={{ color: B.ink }}>Por que regular antes de responder?</b> Em ativação alta, a janela de escolha fica muito estreita. Regulação não é suprimir a emoção — é criar espaço suficiente para escolher o que fazer com ela.
      </div>
      <div className="space-y-3">
        {regulacaoExercises.map(ex => (
          <button key={ex.title} onClick={() => { setSelected(ex); setNote(""); setSaved(false); }}
            className="w-full text-left rounded-3xl border-2 p-4 bg-white transition"
            style={{ borderColor: selected?.title===ex.title ? B.mintDark : "#e5e7eb" }}>
            <h3 className="font-bold text-sm" style={{ color: B.ink }}>{ex.title}</h3>
            <p className="text-xs text-neutral-500 mt-1">{ex.when}</p>
          </button>
        ))}
      </div>
      {selected && (
        <div className="mt-5 space-y-3">
          <div className="rounded-3xl p-4" style={{ backgroundColor: B.cream }}>
            <h3 className="font-bold mb-2" style={{ color: B.ink }}>{selected.title}</h3>
            <p className="text-xs font-semibold text-neutral-500 mb-3">Quando usar: {selected.when}</p>
            <ol className="space-y-2">
              {selected.steps.map((step, i) => (
                <li key={i} className="flex gap-2 text-sm text-neutral-700">
                  <span className="font-bold shrink-0" style={{ color: B.mintDark }}>{i+1}.</span>
                  <span>{step}</span>
                </li>
              ))}
            </ol>
          </div>
          <div className="rounded-3xl p-4 text-sm" style={{ backgroundColor: B.sky }}>
            <p className="font-semibold" style={{ color: B.ink }}>Para lembrar</p>
            <p className="text-neutral-700 mt-1">{selected.anchor}</p>
          </div>
          <Textarea value={note} onChange={e => setNote(e.target.value)} placeholder="Em qual situação quero usar esse recurso?" minH="80px" />
          <Btn onClick={save} className="w-full">Registrar recurso</Btn>
          {saved && <Saved />}
        </div>
      )}
    </Card>
  );
}

function Cues({ setRecords }) {
  const [selected, setSelected] = useState(null);
  const [answer, setAnswer] = useState("");
  const [saved, setSaved] = useState(false);

  function save() {
    if (!selected) return;
    addRecord(setRecords, { type:"pistas sociais", module:"Pistas sociais", prompt:selected[0], answer:answer||"Sem anotação", feedback:`Fato: ${selected[1]}\nInterpretações possíveis: ${selected[2]}\nChecagem: ${selected[3]}` });
    setSaved(true);
  }

  return (
    <Card>
      <SectionHeader iconName="HelpCircle" badge="mentalizar" title="12 · Pistas sociais" subtitle="Separe fato, interpretação e checagem cuidadosa." />
      <div className="space-y-3">
        {cueExamples.map(cue => (
          <button key={cue[0]} onClick={() => { setSelected(cue); setAnswer(""); setSaved(false); }}
            className="w-full text-left rounded-3xl border-2 p-4 bg-white transition"
            style={{ borderColor: selected?.[0]===cue[0] ? B.mintDark : "#e5e7eb" }}>
            <p className="font-bold text-sm" style={{ color: B.ink }}>{cue[0]}</p>
          </button>
        ))}
      </div>
      {selected && (
        <div className="mt-5 space-y-3">
          <div className="rounded-3xl p-4 text-sm space-y-2" style={{ backgroundColor: B.cream }}>
            <p><b>Fato observável:</b> {selected[1]}</p>
            <p><b>Interpretações possíveis:</b> {selected[2]}</p>
            <p><b>Frase de checagem:</b> "{selected[3]}"</p>
          </div>
          <Textarea value={answer} onChange={e => setAnswer(e.target.value)} placeholder="Minha interpretação automática costuma ser..." minH="80px" />
          <Btn onClick={save} className="w-full">Registrar pista</Btn>
          {saved && <Saved />}
        </div>
      )}
    </Card>
  );
}

function Cases({ selectedGoal, setRecords }) {
  const track = selectedGoal ? focusTracks[selectedGoal] : null;
  const [idx, setIdx] = useState(0);
  const [answer, setAnswer] = useState("");
  const [saved, setSaved] = useState(false);

  if (!track) {
    return (
      <Card>
        <SectionHeader iconName="BookOpen" badge="PBL" title="13 · PBL do meu foco" subtitle="Prática baseada em situações reais." />
        <div className="rounded-3xl p-5 text-center text-sm text-neutral-600 leading-relaxed" style={{ backgroundColor: B.soft }}>
          Você ainda não escolheu um foco. Volte ao <b>módulo 1</b> e selecione a trilha que mais faz sentido para você agora.
        </div>
      </Card>
    );
  }

  const item = track.pbl[idx];

  function save() {
    addRecord(setRecords, { type:"situação PBL", module:`PBL · ${track.title}`, prompt:item.scenario, answer:answer||"Sem resposta", feedback:`Modelo possível: ${item.model}` });
    setSaved(true);
  }

  return (
    <Card>
      <SectionHeader iconName="BookOpen" badge="PBL" title="13 · PBL do meu foco" subtitle={`Foco: ${track.title}`} />
      <ProgressBar value={((idx+1)/track.pbl.length)*100} />
      <p className="text-xs text-neutral-500 mt-2 mb-4">Situação {idx+1} de {track.pbl.length}</p>
      <div className="rounded-3xl p-4" style={{ backgroundColor: B.cream }}>
        <p className="text-neutral-700 leading-relaxed text-sm">{item.scenario}</p>
        <ul className="mt-3 list-disc pl-5 text-sm text-neutral-600 space-y-1">
          {item.prompts.map(p => <li key={p}>{p}</li>)}
        </ul>
      </div>
      <Textarea value={answer} onChange={e => { setAnswer(e.target.value); setSaved(false); }} placeholder="Minha resposta..." minH="100px" />
      <details className="mt-3 rounded-2xl p-3" style={{ backgroundColor: B.sky }}>
        <summary className="font-semibold text-sm" style={{ color: B.coralDark }}>Ver modelo possível</summary>
        <p className="mt-2 text-sm text-neutral-700">"{item.model}"</p>
      </details>
      <div className="flex gap-2 mt-4">
        <Btn outline disabled={idx===0} onClick={() => { setIdx(i => i-1); setAnswer(""); setSaved(false); }} className="flex-1">← Anterior</Btn>
        <Btn onClick={save} className="flex-1">Salvar</Btn>
        <Btn outline disabled={idx===track.pbl.length-1} onClick={() => { setIdx(i => i+1); setAnswer(""); setSaved(false); }} className="flex-1">Próximo →</Btn>
      </div>
      {saved && <Saved />}
    </Card>
  );
}

function MapPage({ setRecords }) {
  const fields = [
    ["situação","O que aconteceu?"],
    ["vulnerabilidade","O que ficou incerto, exposto ou sem garantia?"],
    ["pista social","Tom, olhar, silêncio, crítica, distância?"],
    ["interpretação automática","O que minha mente concluiu naquele momento?"],
    ["corpo","Tensão, calor, urgência, congelamento?"],
    ["modo ativado","Ataque, desprezo, controle, invasão, teste, congelamento, ocupar espaço?"],
    ["resposta que dei","O que eu disse ou fiz?"],
    ["resposta cooperativa possível","Como eu poderia ter protegido sem atacar ou invadir?"],
    ["impacto no outro","O que o outro pode ter sentido?"],
    ["reparo","O que posso dizer ou praticar agora?"],
  ];
  const [answers, setAnswers] = useState({});
  const [saved, setSaved] = useState(false);

  function save() {
    fields.forEach(([label]) => addRecord(setRecords, { type:"meu mapa relacional", module:"Meu mapa relacional", prompt:label, answer:answers[label]||"Sem resposta" }));
    setSaved(true);
  }

  return (
    <Card>
      <SectionHeader iconName="Compass" badge="registro guiado" title="14 · Meu mapa relacional" subtitle="Use uma situação real para observar vulnerabilidade, pista, modo e alternativa." />
      <div className="space-y-4">
        {fields.map(([label, placeholder]) => (
          <label key={label} className="block">
            <span className="font-semibold text-sm capitalize" style={{ color: B.ink }}>{label}</span>
            <Textarea value={answers[label]||""} onChange={e => setAnswers(prev => ({...prev,[label]:e.target.value}))} placeholder={placeholder} minH="76px" />
          </label>
        ))}
      </div>
      <Btn onClick={save} className="w-full mt-5">Registrar mapa</Btn>
      {saved && <Saved />}
    </Card>
  );
}

function Report({ records, customNotes, setCustomNotes, selectedGoal }) {
  const goal = selectedGoal ? focusTracks[selectedGoal] : null;
  return (
    <Card>
      <div className="no-print">
        <SectionHeader iconName="Download" badge="salvar" title="16 · Relatório para a sessão" subtitle="Suas respostas estão organizadas abaixo." />
        <Textarea value={customNotes} onChange={e => setCustomNotes(e.target.value)} placeholder="Algo que quero conversar na sessão, uma dúvida, ou uma frase que ficou..." minH="100px" />
        <Btn onClick={() => window.print()} className="w-full mt-4">
          <Ic name="Printer" size={18} color="white" /> Salvar ou imprimir em PDF
        </Btn>
      </div>
      <div className="print-area mt-6">
        <h1 className="text-2xl font-bold" style={{ color: B.ink }}>Mapa dos Vínculos · Relatório</h1>
        {goal && <div className="rounded-3xl p-4 my-4" style={{ backgroundColor: B.amber }}><b>Foco:</b> {goal.title} — {goal.short}</div>}
        <div className="rounded-3xl p-4 mb-5" style={{ backgroundColor: B.soft }}>
          <b>Nota para a sessão:</b>
          <p className="whitespace-pre-wrap mt-1">{customNotes||"Sem anotação final."}</p>
        </div>
        <div className="space-y-3">
          {records.length===0
            ? <p className="text-neutral-500">Nenhuma resposta registrada ainda.</p>
            : records.map((r,idx) => (
              <div key={idx} className="rounded-3xl border border-neutral-100 p-4 break-inside-avoid">
                <p className="text-xs uppercase text-neutral-400">{r.type} · {r.module}</p>
                <p className="font-bold mt-1 text-sm">{r.prompt}</p>
                <p className="mt-1 whitespace-pre-wrap text-sm"><b>Resposta:</b> {r.answer}</p>
                {r.feedback && <p className="mt-1 whitespace-pre-wrap text-sm text-neutral-500"><b>Ideia-chave:</b> {r.feedback}</p>}
              </div>
            ))
          }
        </div>
      </div>
    </Card>
  );
}

function Drawer({ open, onClose, step, setStep }) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 no-print" style={{ background:"rgba(0,0,0,0.3)" }}>
      <button onClick={onClose} className="absolute inset-0 w-full h-full cursor-default border-0 bg-transparent" />
      <div className="absolute right-0 top-0 h-full w-[86%] max-w-sm bg-white shadow-2xl p-4 overflow-y-auto">
        <div className="flex items-center justify-between mb-4">
          <p className="font-bold text-lg" style={{ color: B.ink }}>Menu</p>
          <Btn ghost onClick={onClose}><Ic name="X" size={18} /></Btn>
        </div>
        <div className="space-y-1">
          {chapters.map((c, i) => (
            <button key={c.id} onClick={() => { setStep(i); onClose(); }}
              className="w-full text-left rounded-2xl p-3 text-sm font-medium transition"
              style={{ backgroundColor: i===step ? "#ecfdf5" : "#f9fafb", border: i===step ? `1px solid ${B.mintDark}` : "1px solid transparent", color: B.ink }}>
              {c.title}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── APP PRINCIPAL ────────────────────────────────────────────────────────────
function MapaDosVinculosApp() {
  const [step, setStep] = useState(0);
  const [records, setRecords] = useState([]);
  const [customNotes, setCustomNotes] = useState("");
  const [selectedGoal, setSelectedGoal] = useState("");
  const [menuOpen, setMenuOpen] = useState(false);

  const current = chapters[step];
  const progress = Math.round((step / (chapters.length-1)) * 100);

  function reset() {
    if (records.length>0 && !window.confirm("Reiniciar vai apagar todas as respostas. Continuar?")) return;
    setStep(0); setRecords([]); setCustomNotes(""); setSelectedGoal("");
  }

  const goNext = () => setStep(s => Math.min(chapters.length-1, s+1));
  const goBack = () => setStep(s => Math.max(0, s-1));

  return (
    <div className="h-screen overflow-hidden p-3 sm:p-6"
      style={{ background:`radial-gradient(circle at top left,${B.mint}70,transparent 34%),linear-gradient(180deg,${B.cream},#ffffff)` }}>
      <Drawer open={menuOpen} onClose={() => setMenuOpen(false)} step={step} setStep={setStep} />
      <div className="mx-auto max-w-3xl h-full flex flex-col">

        {/* HEADER */}
        <header className="no-print shrink-0 rounded-3xl p-3 shadow-sm mb-3" style={{ backgroundColor:"rgba(255,255,255,0.88)" }}>
          <div className="flex items-center justify-between gap-2">
            <Btn ghost onClick={() => setMenuOpen(true)}>
              <Ic name="Menu" size={18} /> <span className="text-sm">Menu</span>
            </Btn>
            <div className="text-center">
              <p className="text-[10px] uppercase tracking-widest text-neutral-400">psicoeducação</p>
              <p className="font-bold text-sm" style={{ color: B.ink }}>Mapa dos Vínculos</p>
            </div>
            <Btn ghost onClick={reset} style={{ minWidth:40 }}>
              <Ic name="Refresh" size={16} />
            </Btn>
          </div>
          {step>0 && (
            <div className="mt-3">
              <div className="flex justify-between text-xs text-neutral-500 mb-1">
                <span>{current.title}</span><span>{progress}%</span>
              </div>
              <ProgressBar value={progress} />
            </div>
          )}
        </header>

        {/* MAIN */}
        <main className="flex-1 overflow-y-auto overscroll-contain pb-24" style={{ scrollbarWidth:"thin" }}>
          <div key={current.id} className="page-in">
            {current.type==="home"      && <Home onNext={goNext} />}
            {current.type==="focus"     && <Focus selectedGoal={selectedGoal} setSelectedGoal={setSelectedGoal} setRecords={setRecords} />}
            {current.type==="learn"     && <Learn chapter={current} setRecords={setRecords} />}
            {current.type==="practice"  && <Practice setRecords={setRecords} />}
            {current.type==="compare"   && <Compare setRecords={setRecords} />}
            {current.type==="modes"     && <Modes setRecords={setRecords} />}
            {current.type==="regulacao" && <Regulacao setRecords={setRecords} />}
            {current.type==="cues"      && <Cues setRecords={setRecords} />}
            {current.type==="cases"     && <Cases selectedGoal={selectedGoal} setRecords={setRecords} />}
            {current.type==="map"       && <MapPage setRecords={setRecords} />}
            {current.type==="report"    && <Report records={records} customNotes={customNotes} setCustomNotes={setCustomNotes} selectedGoal={selectedGoal} />}
          </div>
        </main>

        {/* FOOTER NAV */}
        {step>0 && (
          <footer className="no-print fixed bottom-0 left-0 right-0 border-t p-3" style={{ backgroundColor:"rgba(255,255,255,0.95)" }}>
            <div className="mx-auto max-w-3xl flex gap-2">
              <Btn outline onClick={goBack} className="flex-1">
                <Ic name="ArrowLeft" size={16} /> Voltar
              </Btn>
              <Btn onClick={goNext} disabled={step===chapters.length-1} className="flex-[1.3]">
                {step===chapters.length-1 ? "Final" : "Avançar"} <Ic name="ArrowRight" size={16} color="white" />
              </Btn>
            </div>
          </footer>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MapaDosVinculosApp />);
</script>
</body>
</html>
